name: Seed Harness Drift Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  seed_harness:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Validate seed schema
        run: npm run seeds:validate

      - name: Regenerate seed harness
        run: npm run seeds:build

      - name: Fail on schema drift
        run: |
          git diff --exit-code -- data/inspiration-seeds.batch.jsonl data/inspiration-seeds.manifest.json
