name: App Build Drift Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  app_build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Build app
        run: npm run build

      - name: Validate app shell contract
        run: npm run app:validate
